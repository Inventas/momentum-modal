name: CI

env:
  COMPOSE_INTERACTIVE_NO_CLI: 1
  PHP_CS_FIXER_IGNORE_ENV: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  push:
  pull_request:
    branches: [master]

jobs:
  pest:
    name: Tests (Pest) PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3"]
        laravel: ["13.0"]
        inertia: ["3.0"]
        testbench: ["11.0"]

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Resolve Laravel 13 test matrix
        run: |
          composer require --no-interaction --no-update \
            "illuminate/support:^${{ matrix.laravel }}" \
            "inertiajs/inertia-laravel:^${{ matrix.inertia }}" \
            "orchestra/testbench:^${{ matrix.testbench }}"
      - name: Install composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Run tests
        run: vendor/bin/pest

  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
      - name: Install composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Run phpstan
        run: vendor/bin/phpstan analyse
